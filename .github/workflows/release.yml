name: Release portable build

# Build the runnable Windows zips on GitHub's Windows runner so nobody needs .NET locally.
#  - Push a tag like v1.0.0          -> builds both zips AND publishes a GitHub Release.
#  - "Run workflow" (publish=false)  -> builds both zips and uploads them as downloadable artifacts.
#  - "Run workflow" (publish=true)   -> also creates/updates a Release (tag created by gh on `main`).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Also create/update a GitHub Release with the zips'
        type: boolean
        default: false
      version:
        description: 'Release version/tag to use when publishing (e.g. v1.0.0)'
        type: string
        default: 'v1.0.0'

permissions:
  contents: write   # needed for `gh release create`

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF_NAME
          } elseif ('${{ github.event.inputs.publish_release }}' -eq 'true' -and '${{ github.event.inputs.version }}') {
            $version = '${{ github.event.inputs.version }}'
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          # NOTE: do not name this VERSION — MSBuild/NuGet reads $VERSION as the project's
          # $(Version) property, which breaks restore/publish for non-SemVer values.
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # Numeric version stamped into the built assemblies (strip a leading 'v'; fall back to
          # 0.0.0 for dev builds). This makes the app self-report its release version.
          $numeric = ($version -replace '^v', '')
          if ($numeric -notmatch '^\d+\.\d+(\.\d+)?$') { $numeric = '0.0.0' }
          "BUILD_VERSION=$numeric" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Version: $version (build $numeric)"

      - name: Restore
        run: dotnet restore ActuallyGoodScanApp.sln

      - name: Test core pipeline
        run: dotnet test src/ScanApp.Core.Tests/ScanApp.Core.Tests.csproj -c Release --nologo

      - name: Publish (self-contained, no .NET needed)
        shell: pwsh
        run: |
          $dir = "pkg/ActuallyGoodScan-$env:RELEASE_VERSION-selfcontained"
          dotnet publish src/ScanApp.App/ScanApp.App.csproj -c Release -r win-x64 `
            --self-contained true -p:PublishSingleFile=false -p:Version=$env:BUILD_VERSION -o $dir
          if ($LASTEXITCODE -ne 0) { throw "publish failed" }
          'portable' | Out-File -FilePath "$dir/portable.marker" -Encoding utf8
          Copy-Item build/dist/README-selfcontained.txt "$dir/READ-ME-FIRST.txt"

      - name: Publish (framework-dependent, tiny)
        shell: pwsh
        run: |
          $dir = "pkg/ActuallyGoodScan-$env:RELEASE_VERSION-fxdependent"
          dotnet publish src/ScanApp.App/ScanApp.App.csproj -c Release -r win-x64 `
            --self-contained false -p:PublishSingleFile=false -p:Version=$env:BUILD_VERSION -o $dir
          if ($LASTEXITCODE -ne 0) { throw "publish failed" }
          'portable' | Out-File -FilePath "$dir/portable.marker" -Encoding utf8
          Copy-Item build/dist/README-fxdependent.txt "$dir/READ-ME-FIRST.txt"

      - name: Package zips
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Get-ChildItem pkg -Directory | ForEach-Object {
            $zip = "out/$($_.Name).zip"
            Compress-Archive -Path $_.FullName -DestinationPath $zip -Force
            Write-Host "Packed $zip"
          }
          Get-ChildItem out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActuallyGoodScan-${{ env.RELEASE_VERSION }}
          path: out/*.zip
          retention-days: 90

      - name: Publish GitHub Release
        # On a tag push, or on a manual run with publish_release=true.
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $rv = $env:RELEASE_VERSION
          $zips = Get-ChildItem out/*.zip | ForEach-Object { $_.FullName }
          $notes = "Portable Windows builds. Download **selfcontained** to run with no .NET installed, or **fxdependent** (tiny) if you have the .NET 8 Desktop Runtime. Unzip and run ActuallyGoodScan.exe (SmartScreen -> More info -> Run anyway)."

          # Idempotent: update assets if the release already exists, otherwise create it.
          gh release view $rv 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $rv @zips --clobber
          } else {
            $targetArgs = @()
            if ($env:GITHUB_REF -notlike 'refs/tags/*') {
              # Manual run: create the tag at main's tip so the release points at the merged code.
              $targetArgs = @('--target', 'main')
            }
            gh release create $rv @zips @targetArgs --title "Actually Good Scan $rv" --notes $notes
          }
          if ($LASTEXITCODE -ne 0) { throw "release publish failed" }
